<div class="spinner-container">
  @if (!isFinished()) {
    <h2 class="spinner-title">Choosing...</h2>
  }
  <div class="options-wheel">
    @for (option of options(); track option.id; let i = $index) {
      <div class="option-slot"
           [class.highlighted]="highlightIndex() === i && !isFinished()"
           [class.winner]="highlightIndex() === i && isFinished()">
        <span class="option-name">{{ option.name }}</span>
      </div>
    }
  </div>
</div>
