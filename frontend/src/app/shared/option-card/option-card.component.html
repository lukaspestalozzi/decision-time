<mat-card class="option-card">
  <mat-card-header>
    <mat-card-title>{{ option().name }}</mat-card-title>
  </mat-card-header>

  <mat-card-content>
    @if (truncatedDescription()) {
      <p class="description">{{ truncatedDescription() }}</p>
    }

    @if (option().tags.length > 0) {
      <mat-chip-set class="tag-chips">
        @for (tag of option().tags; track tag) {
          <mat-chip>{{ tag }}</mat-chip>
        }
      </mat-chip-set>
    }
  </mat-card-content>

  <mat-card-actions align="end">
    <button mat-icon-button (click)="onEdit()" aria-label="Edit option">
      <mat-icon>edit</mat-icon>
    </button>
    <button mat-icon-button color="warn" (click)="onDelete()" aria-label="Delete option">
      <mat-icon>delete</mat-icon>
    </button>
  </mat-card-actions>
</mat-card>
