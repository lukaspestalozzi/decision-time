<mat-form-field appearance="outline">
  <mat-label>Select voter</mat-label>
  <mat-select [value]="currentVoter()" (selectionChange)="onSelect($event.value)">
    @for (voter of voterLabels(); track voter) {
      <mat-option [value]="voter">{{ voter }}</mat-option>
    }
  </mat-select>
</mat-form-field>
