name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --all-extras
      - name: Lint
        run: uv run ruff check . && uv run ruff format --check .
      - name: Typecheck
        run: uv run mypy app
      - name: Test
        run: uv run pytest

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Lint
        run: npx ng lint
      - name: Test
        run: npx ng test --watch=false
      - name: Build
        run: npx ng build

  docker-and-e2e:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t decision-time .
      - name: Start container
        run: docker run -d --name dt -p 8009:8009 decision-time
      - name: Wait for healthy
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8009/api/v1/health; then
              echo "App is healthy"
              exit 0
            fi
            sleep 2
          done
          echo "App failed to start"
          docker logs dt
          exit 1
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Playwright
        run: cd e2e && npm ci && npx playwright install --with-deps chromium
      - name: Run E2E tests
        run: cd e2e && npx playwright test
      - name: Stop container
        if: always()
        run: docker stop dt || true
